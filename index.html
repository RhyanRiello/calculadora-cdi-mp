<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Calculadora CDI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- FUNDO ANIMADO -->
<div class="money-bg"></div>

<!-- BRILHOS -->
<div class="sparkle" style="top:20%;left:15%;"></div>
<div class="sparkle" style="top:70%;left:40%;"></div>
<div class="sparkle" style="top:50%;left:80%;"></div>
<div class="sparkle" style="top:30%;left:60%;"></div>
<div class="sparkle" style="top:80%;left:20%;"></div>

<div class="container">

<!-- CALCULADORA -->
<div class="calculadora">

<h1>Calculadora de Rendimento CDI</h1>

<label>Tipo de Dias</label>
<select id="tipoDias">
<option value="252">Dias úteis (mercado financeiro)</option>
<option value="365">Dias corridos</option>
</select>

<label>Montante Investido (R$)</label>
<input type="number" id="valor" value="1000">

<label>CDI Anual (%)</label>
<input type="number" id="cdi" value="14.9">

<label>Percentual do CDI (%)</label>
<input type="number" id="percentual" value="100">

<label>Imposto de Renda (%)</label>
<input type="number" id="ir" value="22.5">

<button id="btnCalcular">Calcular</button>

</div>

<!-- RESULTADOS -->
<div class="resultado" id="resultado" style="display:none">

<p>📈 Rendimento Diário Bruto: <span class="valor" id="diaBruto"></span></p>

<p>💰 Rendimento Diário Líquido: <span class="valor" id="diaLiquido"></span></p>

<p>📆 Rendimento Mensal Bruto: <span class="valor" id="mesBruto"></span></p>

<p>💵 Rendimento Mensal Líquido: <span class="valor" id="mesLiquido"></span></p>

</div>

</div>

<script src="script.js"></script>

<div class="autor">
by: Rhyan Riello
</div>

</body>


</html>
