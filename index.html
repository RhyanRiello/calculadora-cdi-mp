<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Calculadora CDI</title>

<link rel="stylesheet" href="css/style.css">
<script src="js/script.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<h1>Calculadora de Rendimento CDI</h1>

<label>Tipo de Dias</label>
<select id="tipoDias">
<option value="252">Dias úteis</option>
<option value="365">Dias corridos</option>
</select>

<label>Valor (R$)</label>
<input type="number" id="valor" value="1000">

<label>CDI (%)</label>
<input type="number" id="cdi" value="14.9">

<button id="btnCalcular">Calcular</button>

<div class="resultado" id="resultado"></div>

</div>

<script src="js/script.js"></script>

</body>
</html>
